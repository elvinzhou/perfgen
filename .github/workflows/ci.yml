name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Rust unit tests + Wasm build verification ──────────────────────────────
  rust:
    name: Rust tests & Wasm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wasm-engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('wasm-engine/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run Rust unit tests (native target)
        run: cargo test --manifest-path wasm-engine/Cargo.toml

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build Wasm (verify it compiles cleanly)
        run: wasm-pack build wasm-engine --target web --out-dir ../public/wasm --no-typescript

  # ── JavaScript unit tests ──────────────────────────────────────────────────
  js:
    name: JavaScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test
